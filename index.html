<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>노들러닝크루 NDRC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    width: 100%;
    background: #c8e435;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 50px;
    position: relative;
  }

  .hero img {
    width: 260px;
    max-width: 70%;
  }

  .card {
    background: #fff;
    border-radius: 28px 28px 0 0;
    padding: 32px 24px 48px;
    width: 100%;
    max-width: 480px;
    margin-top: -24px;
    flex: 1;
  }

  .crew-name {
    font-size: 18px;
    font-weight: 700;
    color: #111827;
    text-align: center;
    margin-bottom: 4px;
  }

  .crew-since {
    font-size: 13px;
    color: #9ca3af;
    text-align: center;
    margin-bottom: 32px;
  }

  .menu-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 18px 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }

  .menu-btn:active { background: #f9fafb; transform: scale(0.98); }

  .menu-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .menu-icon.green { background: #c8e435; }
  .menu-icon.dark { background: #1a1a2e; }

  .menu-text { flex: 1; }
  .menu-title { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 2px; }
  .menu-sub { font-size: 12px; color: #9ca3af; }

  .menu-arrow { color: #d1d5db; font-size: 18px; }
</style>
</head>
<body>

<div class="hero">
  <img src="NDRC_Color_1.png" alt="NDRC 로고">
</div>

<div class="card">
  <div class="crew-name">노들러닝크루, NDRC</div>
  <div class="crew-since">Since 2022.06.02</div>

  <a class="menu-btn" href="checkin.html?token=TOKEN_PLACEHOLDER" id="checkin-link">
    <div class="menu-icon green">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round">
        <path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/>
        <path d="M7 20l3-8 2 3 3-5 3 10"/>
      </svg>
    </div>
    <div class="menu-text">
      <div class="menu-title">출석체크</div>
      <div class="menu-sub">매주 목요일 저녁 러닝</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>

  <a class="menu-btn" href="notice.html">
    <div class="menu-icon dark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8e435" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="menu-text">
      <div class="menu-title">공지사항</div>
      <div class="menu-sub">NDRC 소식을 확인하세요</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec";

function getWeekToken() {
  var now = new Date();
  var day = now.getDay();
  var diff = (day >= 4) ? day - 4 : day + 3;
  var thursday = new Date(now);
  thursday.setDate(now.getDate() - diff);
  var y = thursday.getFullYear();
  var m = String(thursday.getMonth() + 1).padStart(2, "0");
  var d = String(thursday.getDate()).padStart(2, "0");
  return "RUN-" + y + m + d;
}

var token = getWeekToken();
document.getElementById("checkin-link").href = "checkin.html?token=" + token;
</script>
</body>
</html>
