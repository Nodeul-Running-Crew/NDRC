<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDRC 카드뉴스</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

.wrap { width: 100%; max-width: 500px; }

.slider {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 12px;
  scrollbar-width: none;
}
.slider::-webkit-scrollbar { display: none; }

.card {
  flex-shrink: 0;
  width: 300px;
  height: 300px;
  border-radius: 20px;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
}

.deco { position: absolute; border-radius: 50%; opacity: 0.12; }

.card-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}

.card-title { font-size: 22px; font-weight: 800; line-height: 1.25; }
.card-body { font-size: 12px; line-height: 1.8; }
.card-footer { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; opacity: 0.45; }

.step-row { display: flex; flex-direction: column; gap: 10px; }
.step { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; }
.step-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
}

.dots { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: all 0.2s; }
.dot.active { width: 18px; border-radius: 3px; background: #1a1a2e; }

.c-dark { background: #1a1a2e; color: #fff; }
.c-lime { background: #c8e435; color: #1a1a2e; }
.c-light { background: #f5f5f0; color: #1a1a2e; border: 1px solid #e8e8e0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="slider" id="slider">

    <div class="card c-dark">
      <div class="deco" style="width:200px;height:200px;background:#c8e435;top:-80px;right:-80px;"></div>
      <div class="deco" style="width:80px;height:80px;background:#fff;bottom:-20px;left:-20px;"></div>
      <div>
        <div class="card-tag" style="background:#c8e435;color:#1a1a2e;">NOTICE</div>
        <div class="card-title" style="font-size:28px;color:#fff;">출석체크<br>방식이<br>바뀝니다</div>
      </div>
      <div class="card-footer" style="color:#fff;">NODEUL RUNNING CREW</div>
    </div>

    <div class="card c-lime">
      <div class="deco" style="width:150px;height:150px;background:#1a1a2e;bottom:-50px;right:-50px;"></div>
      <div>
        <div class="card-tag" style="background:#1a1a2e;color:#c8e435;">HOW</div>
        <div class="card-title">이제<br>QR코드로<br>출석해요</div>
      </div>
      <div class="card-body" style="color:#1a1a2e;opacity:0.7;">운영진이 QR코드를 보여드려요.<br>카메라로 찍으면 끝!</div>
    </div>

    <div class="card c-light">
      <div>
        <div class="card-tag" style="background:#1a1a2e;color:#fff;">STEP</div>
        <div class="card-title" style="font-size:18px;margin-bottom:16px;">딱 3단계예요</div>
      </div>
      <div class="step-row">
        <div class="step">
          <div class="step-num" style="background:#c8e435;color:#1a1a2e;">1</div>
          <span style="color:#1a1a2e;">운영진 QR코드 카메라로 스캔</span>
        </div>
        <div class="step">
          <div class="step-num" style="background:#c8e435;color:#1a1a2e;">2</div>
          <span style="color:#1a1a2e;">본인 이름 입력</span>
        </div>
        <div class="step">
          <div class="step-num" style="background:#c8e435;color:#1a1a2e;">3</div>
          <span style="color:#1a1a2e;">페이스 선택 후 출석 완료</span>
        </div>
      </div>
    </div>

    <div class="card c-dark">
      <div class="deco" style="width:160px;height:160px;background:#c8e435;top:-60px;right:-60px;"></div>
      <div>
        <div class="card-tag" style="background:#c8e435;color:#1a1a2e;">CHECK</div>
        <div class="card-title" style="color:#fff;font-size:18px;margin-bottom:16px;">이것만<br>기억해요</div>
      </div>
      <div class="step-row">
        <div class="step" style="color:#fff;">
          <div class="step-num" style="background:rgba(200,228,53,0.2);color:#c8e435;font-size:14px;">!</div>
          <span>기본 카메라 앱으로 스캔</span>
        </div>
        <div class="step" style="color:#fff;">
          <div class="step-num" style="background:rgba(200,228,53,0.2);color:#c8e435;font-size:14px;">!</div>
          <span>이름은 가입 시 등록된 이름으로</span>
        </div>
        <div class="step" style="color:#fff;">
          <div class="step-num" style="background:rgba(200,228,53,0.2);color:#c8e435;font-size:14px;">!</div>
          <span>QR은 매주 새로 발급돼요</span>
        </div>
      </div>
    </div>

    <div class="card c-lime">
      <div class="deco" style="width:120px;height:120px;background:#1a1a2e;top:-40px;left:-40px;"></div>
      <div>
        <div class="card-tag" style="background:#1a1a2e;color:#c8e435;">FROM</div>
        <div class="card-title" style="font-size:22px;margin-bottom:12px;">이번 주<br>목요일부터<br>시작해요!</div>
      </div>
      <div>
        <div class="card-body" style="color:#1a1a2e;opacity:0.7;margin-bottom:10px;">런닝 전에 꼭 QR 스캔 잊지 마세요</div>
        <div class="card-footer" style="color:#1a1a2e;">NDRC · Since 2022.06.02</div>
      </div>
    </div>

  </div>

  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
var slider = document.getElementById("slider");
var dots = document.querySelectorAll(".dot");
slider.addEventListener("scroll", function() {
  var idx = Math.round(slider.scrollLeft / 316);
  dots.forEach(function(d, i) { d.classList.toggle("active", i === idx); });
});
</script>
</body>
</html>
